<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Am I Legal? MOT &amp; 30 in 168 Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="am-i-legal-favicon.png">
  
  <style>
    :root {
      --border: #e5e7eb;
      --muted: #6b7280;
      --bg: #f6f7fb;
      --card: #ffffff;
      --shadow: 0 10px 25px rgba(0,0,0,.08);
      --blue: #0057b8;
      --blue-dark: #003f80;
      --orange: #ff7a1a;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: #111827;
      margin: 0;
    }
    
    .page {
      max-width: 960px;
      margin: 1.5rem auto 2.5rem;
      padding: 0 1.25rem;
    }
    
    header {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    
    header img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0.5rem auto 0.75rem;
    }
    
    header h1 {
      font-size: 2rem;
      font-weight: 800;
      color: var(--blue-dark);
      margin-bottom: 0.25rem;
    }
    
    header p {
      color: var(--muted);
      font-size: 0.95rem;
    }
    
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 18px;
      margin-bottom: 1.75rem;
    }
    
    .card h2 {
      font-size: 1.25rem;
      margin: 0 0 6px 0;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--blue-dark);
    }
    
    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin: 0 0 16px 0;
      line-height: 1.4;
    }
    
    .badge {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: rgba(0, 87, 184, 0.08);
      color: var(--blue);
      padding: 0.1rem 0.4rem;
      border-radius: 999px;
    }
    
    /* Shared form styles */
    label {
      display: block;
      font-size: 13px;
      margin: 0 0 6px 0;
      color: #111827;
    }
    
    input, select {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      background: #fff;
      outline: none;
    }
    
    input:focus, select:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 4px rgba(59,130,246,.15);
    }
    
    button {
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
      font-weight: 600;
      background: #111827;
      color: #fff;
      cursor: pointer;
    }
    
    button:hover {
      opacity: 0.95;
    }
    
    .muted { color: var(--muted); }
    .small { font-size: 12px; }
    
    .row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    
    @media (min-width: 700px) {
      .row {
        grid-template-columns: 1fr 1fr;
      }
    }
    
    .grid {
      display: grid;
      gap: 12px;
    }
    
    .toggleRow {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .toggleRow input {
      width: auto;
    }
    
    .results {
      margin-top: 14px;
      display: grid;
      gap: 12px;
    }
    
    .panel {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
    }
    
    .panel h3 {
      margin: 0 0 8px 0;
      font-size: 14px;
    }
    
    .panel p {
      margin: 4px 0;
      font-size: 13px;
    }
    
    .good {
      background: #ecfdf5;
      border-color: #86efac;
    }
    
    .bad {
      background: #fef2f2;
      border-color: #fca5a5;
    }
    
    .gray {
      background: #f3f4f6;
      border-color: #d1d5db;
    }
    
    .inlineTag {
      font-weight: 600;
    }
    
    .error {
      color: #b91c1c;
      font-size: 13px;
      margin-top: 10px;
      display: none;
    }
    
    .sep {
      border-top: 1px solid var(--border);
      margin: 6px 0;
    }
    
    hr {
      border: none;
      border-top: 1px dashed var(--border);
      margin: 1.75rem 0;
    }
    
    /* 30-in-168 specific styles */
    .thirty-168 label {
      margin-top: 0.8rem;
    }
    
    .thirty-168 input[type="datetime-local"] {
      padding: 8px;
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>Am I Legal? MOT &amp; 30 in 168 Calculator</h1>
      <!-- Logo directly below title -->
      <img src="am-i-legal-logo.png" alt="Am I Legal? logo">
      <p class="muted small">Quickly check MOT and 30-in-168 legality.</p>
    </header>

    <!-- Your existing calculator content goes here -->
  </div>
</body>
</html>
